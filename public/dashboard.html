<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StandMe OS — Mission Control</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,0.3);
    --green: #00b894;
    --green-glow: rgba(0,184,148,0.3);
    --red: #e74c3c;
    --red-glow: rgba(231,76,60,0.3);
    --yellow: #fdcb6e;
    --yellow-glow: rgba(253,203,110,0.3);
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .status-bar {
    display: flex;
    gap: 20px;
    font-size: 13px;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--surface2);
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .stat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
  .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
  .dot.yellow { background: var(--yellow); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    min-height: calc(100vh - 60px);
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .log-panel { max-height: 400px; }
  }

  /* Agent Grid */
  .agents-panel {
    padding: 20px;
    overflow-y: auto;
  }
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  /* Agent Card */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s ease;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .agent-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    transform: translateY(-1px);
  }
  .agent-card.running {
    border-color: var(--green);
    box-shadow: 0 0 15px var(--green-glow);
  }
  .agent-card.running::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scan 1.5s linear infinite;
  }
  @keyframes scan {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  .agent-card.error { border-color: var(--red); }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .agent-id {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .agent-name {
    font-size: 15px;
    font-weight: 600;
    margin-top: 2px;
  }
  .agent-status-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-idle { background: var(--surface2); color: var(--text-dim); }
  .badge-running { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-error { background: rgba(231,76,60,0.15); color: var(--red); }

  .agent-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .agent-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .agent-commands {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .cmd-tag {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--blue);
    cursor: pointer;
    transition: all 0.15s;
    font-family: monospace;
  }
  .cmd-tag:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Trigger Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 { margin-bottom: 16px; font-size: 18px; }
  .modal label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    margin-bottom: 12px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a4bd1; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); }

  /* Log Panel */
  .log-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
  }
  .log-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .log-entry {
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    line-height: 1.5;
    transition: background 0.15s;
  }
  .log-entry:hover { background: var(--surface2); }
  .log-entry.start { border-left: 3px solid var(--green); }
  .log-entry.end { border-left: 3px solid var(--blue); }
  .log-entry.error { border-left: 3px solid var(--red); }
  .log-entry.approval { border-left: 3px solid var(--yellow); }
  .log-entry.log { border-left: 3px solid var(--text-dim); }

  .log-time { color: var(--text-dim); margin-right: 8px; }
  .log-agent { color: var(--accent); font-weight: 600; }
  .log-msg { color: var(--text); }

  /* Quick Trigger Bar */
  .trigger-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .trigger-bar input {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .trigger-bar input:focus { border-color: var(--accent); }
  .trigger-bar button {
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .trigger-bar button:hover { background: #5a4bd1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Connection banner */
  .connection-banner {
    display: none;
    background: var(--red);
    color: #fff;
    text-align: center;
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  .connection-banner.show { display: block; }
</style>
</head>
<body>

<div class="connection-banner" id="connectionBanner">Disconnected — Reconnecting...</div>

<div class="header">
  <h1>STANDME OS</h1>
  <div class="status-bar">
    <div class="stat-chip">
      <div class="dot green" id="healthDot"></div>
      <span id="healthText">Connected</span>
    </div>
    <div class="stat-chip">
      <span id="activeCount">0</span>&nbsp;active
    </div>
    <div class="stat-chip">
      <span id="totalRuns">0</span>&nbsp;runs
    </div>
    <div class="stat-chip">
      <span id="errorCount">0</span>&nbsp;errors
    </div>
    <div class="stat-chip">
      Uptime:&nbsp;<span id="uptime">-</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="agents-panel">
    <div class="section-title">Agents</div>
    <div class="agent-grid" id="agentGrid"></div>
  </div>

  <div class="log-panel">
    <div class="log-header">
      Live Feed
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearLogs()">Clear</button>
    </div>
    <div class="log-list" id="logList"></div>
    <div class="trigger-bar">
      <input type="text" id="quickCommand" placeholder="/status, /deadlines, /ask ..." onkeydown="if(event.key==='Enter')quickTrigger()">
      <button onclick="quickTrigger()">Run</button>
    </div>
  </div>
</div>

<!-- Trigger Modal -->
<div class="modal-overlay" id="triggerModal">
  <div class="modal">
    <h3 id="modalTitle">Trigger Agent</h3>
    <label>Command</label>
    <input type="text" id="modalCommand" readonly>
    <label>Arguments (optional)</label>
    <input type="text" id="modalArgs" placeholder="e.g. Arab Health, client name...">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmTrigger()">Run</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  // State
  let agentConfigs = {};
  let agentStatuses = {};
  let logs = [];

  // Socket connection
  const socket = io({ path: '/ws' });

  socket.on('connect', () => {
    document.getElementById('connectionBanner').classList.remove('show');
    document.getElementById('healthDot').className = 'dot green';
    document.getElementById('healthText').textContent = 'Connected';
  });

  socket.on('disconnect', () => {
    document.getElementById('connectionBanner').classList.add('show');
    document.getElementById('healthDot').className = 'dot red';
    document.getElementById('healthText').textContent = 'Disconnected';
  });

  // Initial state
  socket.on('init', (data) => {
    data.agents.forEach(a => { agentStatuses[a.id] = a; });
    logs = data.logs || [];
    updateStats(data.stats);
    fetchConfigs();
    renderLogs();
  });

  // Live events
  socket.on('event', (event) => {
    logs.push(event);
    if (logs.length > 200) logs = logs.slice(-200);
    renderLogEntry(event);
  });

  socket.on('agents', (statuses) => {
    statuses.forEach(a => { agentStatuses[a.id] = a; });
    renderAgents();
  });

  socket.on('stats', updateStats);

  // Fetch agent configs (commands, descriptions)
  async function fetchConfigs() {
    try {
      const res = await fetch('/dashboard/api/agent-configs');
      const configs = await res.json();
      configs.forEach(c => { agentConfigs[c.id] = c; });
      renderAgents();
    } catch (e) {
      console.error('Failed to fetch configs:', e);
    }
  }

  // Render agents
  function renderAgents() {
    const grid = document.getElementById('agentGrid');
    const ids = Object.keys(agentConfigs);
    if (ids.length === 0) return;

    grid.innerHTML = ids.map(id => {
      const config = agentConfigs[id] || {};
      const status = agentStatuses[id] || { state: 'idle', runCount: 0, errorCount: 0 };
      const stateClass = status.state;
      const badgeClass = 'badge-' + status.state;

      const lastRunText = status.lastRun
        ? timeAgo(new Date(status.lastRun))
        : 'never';

      const durationText = status.lastDuration
        ? (status.lastDuration / 1000).toFixed(1) + 's'
        : '-';

      const commands = (config.commands || []).map(cmd =>
        `<span class="cmd-tag" onclick="openTrigger('${cmd}')">${cmd}</span>`
      ).join('');

      const scheduleTag = config.schedule
        ? `<span title="Scheduled">&#128337; ${config.schedule}</span>`
        : '';

      return `
        <div class="agent-card ${stateClass}" id="card-${id}">
          <div class="agent-header">
            <div>
              <div class="agent-id">${id.toUpperCase()}</div>
              <div class="agent-name">${config.name || status.name || id}</div>
            </div>
            <span class="agent-status-badge ${badgeClass}">${status.state}</span>
          </div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${config.description || ''}</div>
          <div class="agent-meta">
            <span>Last: ${lastRunText}</span>
            <span>Dur: ${durationText}</span>
            <span>Runs: ${status.runCount}</span>
            ${status.errorCount > 0 ? `<span style="color:var(--red)">Err: ${status.errorCount}</span>` : ''}
            ${scheduleTag}
          </div>
          <div class="agent-commands">${commands}</div>
        </div>
      `;
    }).join('');
  }

  // Render all logs
  function renderLogs() {
    const list = document.getElementById('logList');
    list.innerHTML = '';
    logs.forEach(renderLogEntry);
  }

  // Render single log entry
  function renderLogEntry(event) {
    const list = document.getElementById('logList');
    const el = document.createElement('div');

    let typeClass = 'log';
    if (event.type === 'agent:start') typeClass = 'start';
    else if (event.type === 'agent:end') typeClass = 'end';
    else if (event.type === 'agent:error') typeClass = 'error';
    else if (event.type === 'approval') typeClass = 'approval';

    const time = new Date(event.timestamp).toLocaleTimeString();
    let msg = '';
    if (event.type === 'agent:start') msg = `Started (${event.data.command})`;
    else if (event.type === 'agent:end') msg = `Done in ${((event.data.duration || 0) / 1000).toFixed(1)}s`;
    else if (event.type === 'agent:error') msg = `Error: ${event.data.message || ''}`;
    else if (event.type === 'approval') msg = `Approval: ${event.data.what}`;
    else msg = event.data.message || '';

    el.className = `log-entry ${typeClass}`;
    el.innerHTML = `<span class="log-time">${time}</span><span class="log-agent">${event.agentName}</span> <span class="log-msg">${escapeHtml(msg)}</span>`;

    list.appendChild(el);
    list.scrollTop = list.scrollHeight;
  }

  // Stats
  function updateStats(stats) {
    if (!stats) return;
    document.getElementById('activeCount').textContent = stats.activeAgents;
    document.getElementById('totalRuns').textContent = stats.totalRuns;
    document.getElementById('errorCount').textContent = stats.totalErrors;
    if (stats.uptimeSince) {
      document.getElementById('uptime').textContent = timeAgo(new Date(stats.uptimeSince));
    }
  }

  // Trigger modal
  function openTrigger(command) {
    document.getElementById('modalCommand').value = command;
    document.getElementById('modalArgs').value = '';
    document.getElementById('modalTitle').textContent = `Run ${command}`;
    document.getElementById('triggerModal').classList.add('active');
    document.getElementById('modalArgs').focus();
  }

  function closeModal() {
    document.getElementById('triggerModal').classList.remove('active');
  }

  async function confirmTrigger() {
    const command = document.getElementById('modalCommand').value;
    const args = document.getElementById('modalArgs').value;
    closeModal();
    await triggerAgent(command, args);
  }

  async function quickTrigger() {
    const input = document.getElementById('quickCommand');
    const text = input.value.trim();
    if (!text) return;
    const parts = text.split(/\s+/);
    const command = parts[0];
    const args = parts.slice(1).join(' ');
    input.value = '';
    await triggerAgent(command, args);
  }

  async function triggerAgent(command, args) {
    try {
      const res = await fetch('/dashboard/api/trigger', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command, args }),
      });
      const data = await res.json();
      if (data.error) {
        addLocalLog('System', `Failed: ${data.error}`);
      } else {
        addLocalLog('System', `Triggered ${command} ${args || ''}`);
      }
    } catch (e) {
      addLocalLog('System', `Network error: ${e.message}`);
    }
  }

  function addLocalLog(agent, message) {
    renderLogEntry({
      type: 'log',
      agentId: 'system',
      agentName: agent,
      timestamp: new Date().toISOString(),
      data: { message },
    });
  }

  function clearLogs() {
    logs = [];
    document.getElementById('logList').innerHTML = '';
  }

  // Helpers
  function timeAgo(date) {
    const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
    if (seconds < 60) return seconds + 's ago';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    return Math.floor(seconds / 86400) + 'd ago';
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // Auto-refresh uptime every 30s
  setInterval(() => {
    const el = document.getElementById('uptime');
    if (el.dataset.since) {
      el.textContent = timeAgo(new Date(el.dataset.since));
    }
  }, 30000);

  // Handle Escape to close modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
