<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StandMe OS</title>
<style>
:root {
  --bg: #09090f;
  --surface: #111118;
  --surface2: #18181f;
  --surface3: #202028;
  --border: #2a2a3a;
  --text: #e2e2e8;
  --text-dim: #7a7a90;
  --accent: #7c6af0;
  --accent-dim: rgba(124,106,240,0.2);
  --accent-hover: #9585f5;
  --green: #22d3a5;
  --green-dim: rgba(34,211,165,0.15);
  --red: #f05c5c;
  --red-dim: rgba(240,92,92,0.15);
  --yellow: #f5c842;
  --yellow-dim: rgba(245,200,66,0.15);
  --blue: #60a5fa;
  --user-bubble: #2d2458;
  --ai-bubble: #18181f;
  --radius: 14px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}

/* ── HEADER ─────────────────────────────────────────────── */
.header {
  height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.header-logo {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 1px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-stats {
  display: flex;
  gap: 10px;
  align-items: center;
}
.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-dim);
}
.stat-chip b { color: var(--text); }
.dot { width:8px; height:8px; border-radius:50%; }
.dot.green { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
.dot.red   { background:var(--red); }
.dot.dim   { background:var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── LAYOUT ─────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: calc(100vh - 54px);
  overflow: hidden;
}
@media (max-width: 960px) {
  .layout { grid-template-columns: 1fr; }
  .right-panel { display: none; }
}

/* ── LEFT: AGENTS PANEL ──────────────────────────────────── */
.agents-panel {
  overflow-y: auto;
  padding: 16px;
  border-right: 1px solid var(--border);
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}
.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative;
  overflow: hidden;
}
.agent-card:hover { border-color:var(--accent); box-shadow:0 0 18px var(--accent-dim); transform:translateY(-1px); }
.agent-card.running { border-color:var(--green); box-shadow:0 0 14px var(--green-dim); }
.agent-card.running::after {
  content:'';position:absolute;top:0;left:-100%;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  animation:scan 1.4s linear infinite;
}
.agent-card.error { border-color:var(--red); }
@keyframes scan { 0%{left:-100%} 100%{left:100%} }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.card-id { font-size:10px; font-weight:700; color:var(--accent); letter-spacing:.5px; }
.card-name { font-size:14px; font-weight:600; margin-top:2px; }
.card-desc { font-size:12px; color:var(--text-dim); margin-top:3px; }
.badge {
  font-size:10px; padding:2px 9px; border-radius:10px;
  font-weight:700; text-transform:uppercase; letter-spacing:.5px;
  flex-shrink:0; margin-left:6px;
}
.badge-idle    { background:var(--surface3); color:var(--text-dim); }
.badge-running { background:var(--green-dim); color:var(--green); }
.badge-error   { background:var(--red-dim); color:var(--red); }

.card-meta {
  display:flex; flex-wrap:wrap; gap:8px;
  font-size:11px; color:var(--text-dim); margin-top:8px;
}
.card-cmds { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.cmd {
  font-size:11px; padding:2px 8px;
  background:var(--surface3); border:1px solid var(--border);
  border-radius:5px; color:var(--blue); cursor:pointer;
  font-family: monospace; transition:all .15s;
}
.cmd:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── RIGHT PANEL ─────────────────────────────────────────── */
.right-panel {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--surface);
  overflow: hidden;
}

/* Activity feed (top, compact) */
.activity-section {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  max-height: 160px;
  display: flex;
  flex-direction: column;
  transition: max-height .3s ease;
}
.activity-section.collapsed { max-height: 38px; }
.activity-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}
.activity-header:hover { color: var(--text); }
.activity-toggle { font-size:10px; transition:transform .2s; }
.activity-section.collapsed .activity-toggle { transform:rotate(180deg); }
.activity-list {
  flex:1; overflow-y:auto; padding:0 8px 8px;
}
.activity-item {
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-family: 'Cascadia Code','Fira Code',monospace;
  color: var(--text-dim);
  border-left: 2px solid transparent;
  margin-bottom: 2px;
}
.activity-item:hover { background: var(--surface2); }
.activity-item.start    { border-color: var(--green); }
.activity-item.end      { border-color: var(--blue); }
.activity-item.error    { border-color: var(--red); color:var(--red); }
.activity-item.approval { border-color: var(--yellow); }
.activity-item.telegram { border-color: #0088cc; color: #5bc8f5; }
.a-time { color: var(--text-dim); margin-right:5px; }
.a-agent { color: var(--accent); font-weight:600; }

/* Chat section */
.chat-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
}
.ai-avatar {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.chat-actions { display:flex; gap:6px; }
.icon-btn {
  padding:4px 10px; font-size:11px; border:1px solid var(--border);
  border-radius:6px; background:transparent; color:var(--text-dim);
  cursor:pointer; transition:all .15s;
}
.icon-btn:hover { background:var(--surface2); color:var(--text); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Messages */
.msg { display:flex; gap:8px; max-width:100%; }
.msg.user { flex-direction:row-reverse; }
.msg-avatar {
  width:28px; height:28px; border-radius:50%;
  background:var(--surface3); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; align-self:flex-end;
}
.msg.user .msg-avatar { background:var(--user-bubble); }
.msg-body { max-width:82%; display:flex; flex-direction:column; gap:3px; }
.msg.user .msg-body { align-items:flex-end; }
.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  line-height: 1.6;
  font-size: 13px;
  word-wrap: break-word;
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-bottom-right-radius: 4px;
  color: #ddd4ff;
}
.msg.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
/* RTL for Arabic */
.bubble[dir="rtl"] {
  text-align: right;
  font-size: 14px;
}
.msg-time { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

/* Agent result card inside chat */
.agent-result-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin: 6px 0;
  font-size: 12px;
}
.agent-result-card.error { border-left-color: var(--red); }
.agent-result-card .arc-title {
  font-size:11px; font-weight:700; color:var(--accent);
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;
  display:flex; align-items:center; gap:6px;
}
.agent-result-card.error .arc-title { color:var(--red); }
.agent-result-card pre {
  white-space: pre-wrap; word-wrap: break-word;
  font-family: inherit; font-size:12px; color:var(--text-dim);
  max-height:200px; overflow-y:auto;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  padding: 6px 14px 0;
}
.typing-indicator.show { display:flex; }
.typing-dots {
  display:flex; align-items:center; gap:4px;
  background:var(--ai-bubble); border:1px solid var(--border);
  padding:10px 14px; border-radius:16px; border-bottom-left-radius:4px;
}
.typing-dots span {
  width:6px; height:6px; border-radius:50%;
  background:var(--text-dim); display:inline-block;
  animation:typebounce .8s infinite;
}
.typing-dots span:nth-child(2) { animation-delay:.15s; }
.typing-dots span:nth-child(3) { animation-delay:.3s; }
@keyframes typebounce { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1.1);opacity:1} }

/* Agent running indicator */
.agent-running-badge {
  display:none; align-items:center; gap:6px;
  padding:4px 10px 4px 14px;
  font-size:11px; color:var(--green);
}
.agent-running-badge.show { display:flex; }
.agent-running-badge::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:var(--green); animation:pulse 1s infinite;
}

/* Input area */
.chat-input-area {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 10px 8px 14px;
  transition: border-color .2s;
}
.input-row:focus-within { border-color: var(--accent); }
#chatInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  max-height: 120px;
  min-height: 22px;
  font-family: inherit;
}
#chatInput::placeholder { color: var(--text-dim); }
#sendBtn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--accent); border: none;
  color: #fff; cursor: pointer; flex-shrink:0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; font-size:16px;
}
#sendBtn:hover { background: var(--accent-hover); }
#sendBtn:disabled { opacity:.4; cursor:not-allowed; }
.input-hint { font-size:10px; color:var(--text-dim); margin-top:5px; text-align:right; }

/* Markdown inside bubbles */
.bubble h1,.bubble h2,.bubble h3 { margin:.5em 0 .25em; font-size:14px; }
.bubble h1 { font-size:15px; }
.bubble p { margin:.3em 0; }
.bubble ul,.bubble ol { margin:.3em 0 .3em 1.2em; }
.bubble li { margin:.15em 0; }
.bubble strong { color:#fff; }
.bubble code {
  background:var(--surface3); padding:1px 5px; border-radius:4px;
  font-family:monospace; font-size:11px;
}
.bubble pre {
  background:var(--surface3); padding:10px; border-radius:8px;
  overflow-x:auto; font-size:11px; margin:.4em 0;
}
.bubble blockquote {
  border-left:3px solid var(--accent); padding-left:10px;
  color:var(--text-dim); margin:.4em 0;
}

/* Connection banner */
.conn-banner {
  display:none; background:var(--red); color:#fff;
  text-align:center; padding:7px; font-size:12px; font-weight:600;
}
.conn-banner.show { display:block; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

/* Trigger modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.55); z-index:200;
  align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; width:400px; max-width:90vw;
}
.modal h3 { font-size:16px; margin-bottom:16px; }
.modal label { font-size:12px; color:var(--text-dim); display:block; margin-bottom:4px; }
.modal input {
  width:100%; padding:9px 12px; font-size:13px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); margin-bottom:12px; outline:none;
}
.modal input:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; }
.btn { padding:9px 18px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.btn-p { background:var(--accent); color:#fff; }
.btn-p:hover { background:var(--accent-hover); }
.btn-g { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
.btn-g:hover { background:var(--surface2); }
</style>
</head>
<body>

<div class="conn-banner" id="connBanner">Reconnecting...</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">STANDME OS</div>
  <div class="header-stats">
    <div class="stat-chip"><div class="dot green" id="hDot"></div><span id="hText">Connected</span></div>
    <div class="stat-chip"><b id="activeCount">0</b>&nbsp;active</div>
    <div class="stat-chip"><b id="totalRuns">0</b>&nbsp;runs</div>
    <div class="stat-chip"><b id="errCount">0</b>&nbsp;errors</div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: AGENTS -->
  <div class="agents-panel">
    <div class="section-label">Agents</div>
    <div class="agent-grid" id="agentGrid"></div>
  </div>

  <!-- RIGHT: ACTIVITY + AI CHAT -->
  <div class="right-panel">

    <!-- Activity Feed (compact, collapsible) -->
    <div class="activity-section" id="activitySection">
      <div class="activity-header" onclick="toggleActivity()">
        <span>Live Activity</span>
        <span class="activity-toggle" id="actToggle">▲</span>
      </div>
      <div class="activity-list" id="activityList"></div>
    </div>

    <!-- AI Chat -->
    <div class="chat-section">
      <div class="chat-header">
        <div class="chat-title">
          <div class="ai-avatar">✦</div>
          <div>
            <div style="font-size:13px;font-weight:700">StandMe AI</div>
            <div style="font-size:10px;color:var(--text-dim)" id="aiStatus">Ready</div>
          </div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn" onclick="clearChat()">Clear</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>

      <div class="agent-running-badge" id="agentRunning"></div>

      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="chatInput" rows="1" placeholder="Ask anything in Arabic or English... اسأل أي شيء"></textarea>
          <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>

  </div>
</div>

<!-- Trigger modal (from agent card commands) -->
<div class="modal-overlay" id="trigModal">
  <div class="modal">
    <h3 id="modalTitle">Run Command</h3>
    <label>Command</label>
    <input type="text" id="modalCmd" readonly>
    <label>Arguments (optional)</label>
    <input type="text" id="modalArgs" placeholder="e.g. Arab Health 2025">
    <div class="modal-btns">
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="confirmModal()">Run via AI</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SESSION_ID = 'sess_' + Math.random().toString(36).substr(2, 9);
let agentConfigs = {};
let agentStatuses = {};
let streamingBuffer = '';
let isStreaming = false;
let currentStreamBubble = null;
let activityCollapsed = false;

// ── SOCKET ───────────────────────────────────────────────────────────────
const socket = io({ path: '/ws' });

socket.on('connect', () => {
  document.getElementById('connBanner').classList.remove('show');
  document.getElementById('hDot').className = 'dot green';
  document.getElementById('hText').textContent = 'Connected';
});
socket.on('disconnect', () => {
  document.getElementById('connBanner').classList.add('show');
  document.getElementById('hDot').className = 'dot red';
  document.getElementById('hText').textContent = 'Disconnected';
});

// Initial state
socket.on('init', data => {
  data.agents?.forEach(a => { agentStatuses[a.id] = a; });
  updateStats(data.stats);
  fetchAgentConfigs();
  data.logs?.forEach(addActivityItem);
});

socket.on('event', addActivityItem);
socket.on('agents', statuses => {
  statuses.forEach(a => { agentStatuses[a.id] = a; });
  renderAgents();
});
socket.on('stats', updateStats);

// ── CHAT EVENTS ──────────────────────────────────────────────────────────
socket.on('chat:welcome', data => {
  appendMessage('ai', data.text, data.timestamp);
});

socket.on('chat:typing', () => {
  showTyping(true);
  setAiStatus('Thinking...');
  startStreamBubble();
});

socket.on('chat:chunk', data => {
  if (data.sessionId !== SESSION_ID) return;
  showTyping(false);
  appendChunk(data.text);
});

socket.on('chat:agent_start', data => {
  if (data.sessionId !== SESSION_ID) return;
  const badge = document.getElementById('agentRunning');
  badge.textContent = 'Running ' + data.command + '...';
  badge.classList.add('show');
  setAiStatus('Running ' + data.command);
});

socket.on('chat:agent_done', data => {
  if (data.sessionId !== SESSION_ID) return;
  document.getElementById('agentRunning').classList.remove('show');
});

socket.on('chat:done', data => {
  if (data.sessionId !== SESSION_ID) return;
  finaliseStream();
  showTyping(false);
  document.getElementById('agentRunning').classList.remove('show');
  setAiStatus('Ready');
  enableInput(true);
});

socket.on('chat:error', data => {
  if (data.sessionId !== SESSION_ID) return;
  finaliseStream();
  showTyping(false);
  setAiStatus('Error — try again');
  enableInput(true);
});

// ── STREAMING ─────────────────────────────────────────────────────────────
function startStreamBubble() {
  if (currentStreamBubble) return;
  streamingBuffer = '';
  const msgs = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.innerHTML = `
    <div class="msg-avatar">✦</div>
    <div class="msg-body">
      <div class="bubble" id="streamBubble"></div>
      <div class="msg-time" id="streamTime"></div>
    </div>`;
  msgs.appendChild(wrap);
  currentStreamBubble = document.getElementById('streamBubble');
  scrollChat();
}

function appendChunk(text) {
  if (!currentStreamBubble) startStreamBubble();
  streamingBuffer += text;
  // Render markdown progressively
  currentStreamBubble.innerHTML = renderMd(streamingBuffer);
  // Apply RTL if Arabic
  if (/[\u0600-\u06FF]/.test(streamingBuffer.substring(0, 50))) {
    currentStreamBubble.setAttribute('dir', 'rtl');
  }
  scrollChat();
}

function finaliseStream() {
  if (currentStreamBubble && streamingBuffer) {
    currentStreamBubble.innerHTML = renderMd(streamingBuffer);
    const timeEl = document.getElementById('streamTime');
    if (timeEl) timeEl.textContent = formatTime(new Date());
  }
  currentStreamBubble = null;
  streamingBuffer = '';
  scrollChat();
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  input.style.height = '22px';
  enableInput(false);

  appendMessage('user', text);
  socket.emit('chat:send', { message: text, sessionId: SESSION_ID });
}

function appendMessage(role, content, timestamp) {
  const msgs = document.getElementById('chatMessages');
  const time = timestamp ? formatTime(new Date(timestamp)) : formatTime(new Date());
  const isAr = /[\u0600-\u06FF]/.test(content.substring(0, 60));
  const dir = isAr ? 'dir="rtl"' : '';

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'user') {
    wrap.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-body">
        <div class="bubble" ${dir}>${escHtml(content)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div class="msg-body">
        <div class="bubble" ${dir}>${renderMd(content)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  }
  msgs.appendChild(wrap);
  scrollChat();
}

function clearChat() {
  document.getElementById('chatMessages').innerHTML = '';
  socket.emit('chat:clear', { sessionId: SESSION_ID });
  streamingBuffer = '';
  currentStreamBubble = null;
  setAiStatus('Ready');
  enableInput(true);
}

// ── AGENTS ────────────────────────────────────────────────────────────────
async function fetchAgentConfigs() {
  try {
    const r = await fetch('/dashboard/api/agent-configs');
    const configs = await r.json();
    configs.forEach(c => { agentConfigs[c.id] = c; });
    renderAgents();
  } catch(e) { console.error(e); }
}

function renderAgents() {
  const grid = document.getElementById('agentGrid');
  const ids = Object.keys(agentConfigs);
  if (!ids.length) return;

  grid.innerHTML = ids.map(id => {
    const c = agentConfigs[id] || {};
    const s = agentStatuses[id] || { state:'idle', runCount:0, errorCount:0 };
    const cmds = (c.commands||[]).map(cmd =>
      `<span class="cmd" onclick="openModal('${cmd}')">${cmd}</span>`
    ).join('');
    const sched = c.schedule ? `<span title="Scheduled">🕑 ${c.schedule}</span>` : '';
    const ago = s.lastRun ? timeAgo(new Date(s.lastRun)) : 'never';
    const dur = s.lastDuration ? (s.lastDuration/1000).toFixed(1)+'s' : '-';
    return `
      <div class="agent-card ${s.state}" id="card-${id}">
        <div class="card-top">
          <div>
            <div class="card-id">${id.toUpperCase()}</div>
            <div class="card-name">${c.name||s.name||id}</div>
          </div>
          <span class="badge badge-${s.state}">${s.state}</span>
        </div>
        <div class="card-desc">${c.description||''}</div>
        <div class="card-meta">
          <span>Last: ${ago}</span><span>Dur: ${dur}</span>
          <span>Runs: ${s.runCount}</span>
          ${s.errorCount>0?`<span style="color:var(--red)">Err:${s.errorCount}</span>`:''}
          ${sched}
        </div>
        <div class="card-cmds">${cmds}</div>
      </div>`;
  }).join('');
}

// ── ACTIVITY FEED ─────────────────────────────────────────────────────────
function addActivityItem(event) {
  const list = document.getElementById('activityList');
  const el = document.createElement('div');
  let typeClass = 'log';
  if (event.agentId==='telegram') typeClass='telegram';
  else if (event.type==='agent:start') typeClass='start';
  else if (event.type==='agent:end') typeClass='end';
  else if (event.type==='agent:error') typeClass='error';
  else if (event.type==='approval') typeClass='approval';

  let msg='';
  if (event.agentId==='telegram') msg = (event.data?.message||'').substring(0,100);
  else if (event.type==='agent:start') msg=`▶ running (${event.data?.command||''})`;
  else if (event.type==='agent:end') msg=`✓ done in ${((event.data?.duration||0)/1000).toFixed(1)}s`;
  else if (event.type==='agent:error') msg=`✗ error: ${(event.data?.message||'').substring(0,60)}`;
  else if (event.type==='approval') msg=`⏳ approval: ${event.data?.what||''}`;
  else msg = (event.data?.message||'').substring(0,80);

  const time = new Date(event.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.className = `activity-item ${typeClass}`;
  el.innerHTML = `<span class="a-time">${time}</span><span class="a-agent">${event.agentName}</span> ${escHtml(msg)}`;
  list.appendChild(el);
  // Keep max 50 items
  while (list.children.length > 50) list.removeChild(list.firstChild);
  if (!activityCollapsed) list.scrollTop = list.scrollHeight;
}

function toggleActivity() {
  activityCollapsed = !activityCollapsed;
  document.getElementById('activitySection').classList.toggle('collapsed', activityCollapsed);
}

// ── MODAL (agent card cmd click) ──────────────────────────────────────────
function openModal(cmd) {
  document.getElementById('modalCmd').value = cmd;
  document.getElementById('modalArgs').value = '';
  document.getElementById('modalTitle').textContent = `Run ${cmd}`;
  document.getElementById('trigModal').classList.add('active');
  document.getElementById('modalArgs').focus();
}
function closeModal() {
  document.getElementById('trigModal').classList.remove('active');
}
function confirmModal() {
  const cmd = document.getElementById('modalCmd').value;
  const args = document.getElementById('modalArgs').value;
  closeModal();
  // Inject into chat as a message so AI handles it with full context
  const input = document.getElementById('chatInput');
  input.value = cmd + (args ? ' ' + args : '');
  sendMessage();
}

// ── STATS ─────────────────────────────────────────────────────────────────
function updateStats(stats) {
  if (!stats) return;
  document.getElementById('activeCount').textContent = stats.activeAgents;
  document.getElementById('totalRuns').textContent = stats.totalRuns;
  document.getElementById('errCount').textContent = stats.totalErrors;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function enableInput(yes) {
  document.getElementById('chatInput').disabled = !yes;
  document.getElementById('sendBtn').disabled = !yes;
  isStreaming = !yes;
}
function showTyping(show) {
  document.getElementById('typingIndicator').classList.toggle('show', show);
}
function setAiStatus(text) {
  document.getElementById('aiStatus').textContent = text;
}
function scrollChat() {
  const el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}
function renderMd(text) {
  if (typeof marked === 'undefined') return escHtml(text);
  return marked.parse(text, { breaks: true, gfm: true });
}
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function formatTime(d) {
  return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
function timeAgo(d) {
  const s = Math.floor((Date.now()-d)/1000);
  if (s<60) return s+'s ago';
  if (s<3600) return Math.floor(s/60)+'m ago';
  if (s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ── INPUT AUTO-RESIZE + KEYBOARD ─────────────────────────────────────────
const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', () => {
  chatInput.style.height = '22px';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
});
</script>
</body>
